name: ACT Pipeline Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  # Ensure top-level 'act' package is importable in all jobs
  PYTHONPATH: ${{ github.workspace }}
  # Optional: make TF deterministic-ish and reduce noisy logs
  TF_ENABLE_ONEDNN_OPTS: "0"
  # Enable CI mode for lightweight installs
  ACT_CI_MODE: "true"

jobs:
  # Pipeline fuzzing tests
  pipeline-fuzzing:
    name: Pipeline Fuzzing Tests
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Clean pip cache
        run: |
          pip cache purge

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage torch torchvision onnx onnx2torch tensorflow pandas numpy pyyaml tqdm psutil transformers scikit-learn

      - name: Download CIFAR-100 benchmark
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --download cifar100_2024

      - name: List downloaded data-model pairs
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --list-downloaded

      - name: Get benchmark info
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --info cifar100_2024

      - name: Run fuzzing with --dataset flag (short timeout for CI)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --fuzz --dataset cifar100_2024 --max-instances 2 --timeout 30 --iterations 500

      - name: Run fuzzing with --category flag (short timeout for CI)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --fuzz --category cifar100_2024 --max-instances 2 --timeout 30 --iterations 500

      - name: Test list command
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --list

      - name: Test search command
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --search cifar

      - name: Verify act2torch round-trip on example nets
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --verify act2torch --device cpu --dtype float64

      - name: Validate verifier counterexample mode
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --validate-verifier --mode counterexample --device cpu --dtype float64

      - name: Validate verifier bounds mode (interval)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --validate-verifier --mode bounds --device cpu --dtype float64 --tf-modes interval

      - name: Validate verifier bounds mode (hybridz)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --validate-verifier --mode bounds --device cpu --dtype float64 --tf-modes hybridz

      - name: Validate verifier bounds mode (dual)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --validate-verifier --mode bounds --device cpu --dtype float64 --tf-modes dual

      - name: VNNLIB real-instance coverage (tiny test fixtures) + execution tracing
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --fuzz --category test --max-instances 5 --timeout 10 --iterations 50 --trace-level 1 --trace-sample 5
          # Exercise trace_reader.py on the freshest trace file produced above.
          # Default CLI output is Path("fuzzing_results") which is CWD-relative; the
          # YAML-loaded normalization only applies when the value enters as a string,
          # so the actual landing site is <cwd>/fuzzing_results/traces_*.json. We
          # also check the YAML-normalized path for robustness.
          TRACE_FILE=$(ls -1 fuzzing_results/traces_*.json act/pipeline/log/fuzzing_results/traces_*.json 2>/dev/null | head -1)
          if [ -n "$TRACE_FILE" ]; then
            coverage run -p --source=act -m act.pipeline.fuzzing.trace_reader "$TRACE_FILE" --summary
          fi

      - name: Combine coverage data
        if: always()
        run: |
          cd ${{ github.workspace }}
          coverage combine
          coverage xml -o coverage.xml
          coverage report

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: pipeline
          name: pipeline
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
