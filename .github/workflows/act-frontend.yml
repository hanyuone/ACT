name: ACT Frontend Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  # Ensure top-level 'act' package is importable in all jobs
  PYTHONPATH: ${{ github.workspace }}
  # Optional: make TF deterministic-ish and reduce noisy logs
  TF_ENABLE_ONEDNN_OPTS: "0"
  # Enable CI mode for lightweight installs
  ACT_CI_MODE: "true"

jobs:
  # Frontend tests
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Clean pip cache
        run: |
          pip cache purge || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage torch torchvision onnx onnx2torch tensorflow pandas numpy pyyaml tqdm pytest psutil transformers scikit-learn

      - name: Run VNNLIB Data-Model and Synthesis
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.front_end --download acasxu_2023
          coverage run -p --source=act -m act.front_end --list-downloads
          coverage run -p --source=act -m act.front_end --synthesis --creator vnnlib

      - name: Run TorchVision Data-Model and Synthesis
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.front_end --download MNIST
          coverage run -p --source=act -m act.front_end --download CIFAR10
          coverage run -p --source=act -m act.front_end --list-downloads
          coverage run -p --source=act -m act.front_end --synthesis --creator torchvision

      - name: Generate Networks for Testing
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.back_end --generate --device cpu --dtype float64

      - name: Run ACT2Torch Pipeline Tests
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --verify act2torch --device cpu --dtype float64

      - name: Run Torch2ACT Pipeline Tests
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --verify torch2act --device cpu --dtype float64

      - name: Combine coverage data
        if: always()
        run: |
          cd ${{ github.workspace }}
          coverage combine || true
          coverage xml -o coverage.xml || true
          coverage report || true

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: frontend
          name: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}