name: ACT BaB Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHONPATH: ${{ github.workspace }}
  ACT_CI_MODE: "true"

jobs:
  bab-tests:
    name: Branch-and-Bound Tests
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Clean pip cache
        run: |
          pip cache purge || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision onnx onnx2torch tensorflow pandas numpy pyyaml tqdm pytest psutil transformers scikit-learn

      - name: Run BaB module tests
        run: |
          cd ${{ github.workspace }}
          python -m act.back_end.bab.test_bab

      - name: Generate example networks
        run: |
          cd ${{ github.workspace }}
          python -m act.back_end --generate --device cpu --dtype float64

      - name: Run BaB verification (float64)
        run: |
          cd ${{ github.workspace }}
          NET=$(ls act/back_end/examples/nets/mlp_block_*.json | head -1)
          echo "Testing BaB on: $NET"
          python -m act.back_end --verify --network "$NET" \
            --bab --bab-max-depth 3 --bab-max-subproblems 10 --timeout 60 \
            --bab-branching random --bab-scheduling random \
            --solver torch --device cpu --dtype float64 --verbose
