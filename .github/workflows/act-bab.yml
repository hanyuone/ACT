name: ACT BaB Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHONPATH: ${{ github.workspace }}
  ACT_NETS_DIR: act/back_end/examples/nets
  ACT_CI_MODE: "true"
  ACT_SOLVER: "torchlp"
  ACT_DEVICE: "cpu"
  ACT_DTYPE: "float64"

jobs:
  bab-tests:
    name: Branch-and-Bound Tests
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Clean pip cache
        run: |
          pip cache purge

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage torch onnx onnx2torch onnx-simplifier pandas numpy pyyaml tqdm psutil

      - name: Run BaB module tests
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.back_end.bab.bab

      - name: Cache generated networks
        id: nets-cache
        uses: actions/cache@v4
        with:
          path: act/back_end/examples/nets
          key: act-nets-${{ hashFiles('act/back_end/examples/config_gen_act_net.yaml', 'act/back_end/net_factory.py', 'act/back_end/config.yaml') }}
          restore-keys: |
            act-nets-

      - name: Generate example networks
        if: steps.nets-cache.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.back_end --generate

      - name: Run broad verification (float64) over all generated nets
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --validate-verifier --mode counterexample --device cpu --dtype float64 --solvers torchlp

      - name: Run BaB integration on representative nets
        run: |
          cd ${{ github.workspace }}
          for net in layer_testing_bab_deep layer_testing_lrelu mlp_block_4x16_32x1_1568868034; do
            coverage run -p -m act.back_end --verify \
              --network "$ACT_NETS_DIR/$net.json" --bab \
              --timeout 30 --bab-max-depth 8 --bab-max-subproblems 300
          done

      - name: Download VNNLIB benchmarks for BaB dual-tier coverage
        run: |
          cd ${{ github.workspace }}
          for cat in acasxu_2023 dist_shift_2023 safenlp_2024; do
            coverage run -p -m act.front_end --download $cat
          done

      # ─────────────────────────────────────────────────────────────────
      # BaB + dual-tier coverage (exercises verify_bab_batched dispatch,
      # _optimize_alpha_eta, warm-state plumbing, η pre-activation step,
      # branching strategies, per-class α modes, warm-start toggle).
      # Smoke budget: max_depth=3, max_nodes=10 — each call <60 s.
      # Any final VerifyStatus (CERTIFIED/FALSIFIED/UNKNOWN/TIMEOUT) is
      # acceptable; the goal is exercising the code paths end-to-end.
      # ─────────────────────────────────────────────────────────────────

      - name: Verify acasxu_2023 with BaB (dual / dual_alpha / dual_alpha_eta)
        run: |
          cd ${{ github.workspace }}
          for tier in dual dual_alpha dual_alpha_eta; do
            coverage run -p -m act.pipeline --verify vnnlib --category acasxu_2023 --max-instances 2 \
              --solvers dual --bab --bab-solver-tier $tier --bab-max-depth 3 --bab-max-nodes 10 \
              --device cpu --dtype float64
          done

      - name: Verify dist_shift_2023 with BaB (dual_alpha_eta)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --verify vnnlib --category dist_shift_2023 --max-instances 2 \
            --solvers dual --bab --bab-solver-tier dual_alpha_eta --bab-max-depth 3 --bab-max-nodes 10 \
            --device cpu --dtype float64

      - name: Verify safenlp_2024 with BaB (dual_alpha_eta)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --verify vnnlib --category safenlp_2024 --max-instances 2 \
            --solvers dual --bab --bab-solver-tier dual_alpha_eta --bab-max-depth 3 --bab-max-nodes 10 \
            --device cpu --dtype float64

      - name: Verify acasxu with BaB knobs — BaBSR / shared-α / no-warm-start
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --verify vnnlib --category acasxu_2023 --max-instances 1 \
            --solvers dual --bab --bab-solver-tier dual_alpha_eta \
            --bab-branching-method babsr \
            --bab-max-depth 3 --bab-max-nodes 10 --device cpu --dtype float64
          coverage run -p -m act.pipeline --verify vnnlib --category acasxu_2023 --max-instances 1 \
            --solvers dual --bab --bab-solver-tier dual_alpha --bab-per-class-alpha false \
            --bab-max-depth 3 --bab-max-nodes 10 --device cpu --dtype float64
          coverage run -p -m act.pipeline --verify vnnlib --category acasxu_2023 --max-instances 1 \
            --solvers dual --bab --bab-solver-tier dual_alpha_eta --bab-no-warm-start \
            --bab-max-depth 3 --bab-max-nodes 10 --device cpu --dtype float64

      - name: Combine coverage data
        if: always()
        run: |
          cd ${{ github.workspace }}
          coverage combine
          coverage xml -o coverage.xml
          coverage report

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: bab
          name: bab
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
