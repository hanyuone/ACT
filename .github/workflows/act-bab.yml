name: ACT BaB Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHONPATH: ${{ github.workspace }}
  ACT_CI_MODE: "true"
  ACT_SOLVER: "torch"
  ACT_DEVICE: "cpu"
  ACT_DTYPE: "float64"

jobs:
  bab-tests:
    name: Branch-and-Bound Tests
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Clean pip cache
        run: |
          pip cache purge || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage torch torchvision onnx onnx2torch tensorflow pandas numpy pyyaml tqdm pytest psutil transformers scikit-learn

      - name: Run BaB module tests
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.back_end.bab.bab

      - name: Generate example networks
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.back_end --generate

      - name: Run BaB verification (float64) over all generated nets
        run: |
          cd ${{ github.workspace }}
          NETS_DIR=act/back_end/examples/nets
          # Iterate every *.json under nets/ (skip _meta/manifest.json).
          # All settings from act/back_end/config.yaml + ACT_* env vars above.
          # '|| true' on each invocation: BaB / MILP export may not yet
          # support every layer kind (e.g. CONVTRANSPOSE2D / CONV1D
          # cons_exportor entries are not yet wired); we still want the
          # successful nets' coverage signal uploaded.
          for net in "$NETS_DIR"/*.json; do
            [ -f "$net" ] || continue
            echo "=== BaB verify: $(basename "$net") ==="
            coverage run -p --source=act -m act.back_end --verify --network "$net" || true
          done

      - name: Combine coverage data
        if: always()
        run: |
          cd ${{ github.workspace }}
          coverage combine || true
          coverage xml -o coverage.xml || true
          coverage report || true

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: bab
          name: bab
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
