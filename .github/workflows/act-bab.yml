name: ACT BaB Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHONPATH: ${{ github.workspace }}
  ACT_NETS_DIR: act/back_end/examples/nets
  ACT_CI_MODE: "true"
  ACT_SOLVER: "torchlp"
  ACT_DEVICE: "cpu"
  ACT_DTYPE: "float64"

jobs:
  bab-tests:
    name: Branch-and-Bound Tests
    runs-on: ubuntu-latest
    steps:
      # ── Setup ──────────────────────────────────────────────────────────
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Clean pip cache
        run: |
          pip cache purge

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage torch onnx onnx2torch onnx-simplifier pandas numpy pyyaml tqdm psutil

      # ── BaB module unit tests ──────────────────────────────────────────
      - name: BaB module
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.back_end.bab.bab

      # ── Generate artificial ACT nets (NetFactory) ──────────────────────
      - name: Cache generated networks
        id: nets-cache
        uses: actions/cache@v4
        with:
          path: act/back_end/examples/nets
          key: act-nets-${{ hashFiles('act/back_end/examples/config_gen_act_net.yaml', 'act/back_end/net_factory.py', 'act/back_end/config.yaml') }}
          restore-keys: |
            act-nets-

      - name: Generate example networks
        if: steps.nets-cache.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.back_end --generate

      # ── VNNLIB benchmarks: cache + download (network; consumed below) ──
      - name: Cache VNNLIB benchmarks
        id: vnnlib-cache
        uses: actions/cache@v4
        with:
          path: data/vnnlib
          key: vnnlib-acasxu-distshift-safenlp-v1
          restore-keys: |
            vnnlib-

      - name: VNNLIB — download benchmarks
        run: |
          cd ${{ github.workspace }}
          for cat in acasxu_2023 dist_shift_2023 safenlp_2024; do
            coverage run -p -m act.front_end --download $cat
          done

      # ===================================================================
      # Core engine & solver tiers (default branching). Baseline coverage of
      # verify_bab_batched on ACT nets + the dual α/η tiers on VNNLIB.
      # ===================================================================
      - name: Soundness — concrete counterexample cross-check (all ACT nets)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --validate-verifier --mode counterexample --device cpu --dtype float64 --solvers torchlp

      - name: BaB random branching + split (ACT nets)
        run: |
          cd ${{ github.workspace }}
          for net in layer_testing_bab_deep layer_testing_lrelu mlp_block_4x16_32x1_1568868034; do
            coverage run -p -m act.back_end --verify \
              --network "$ACT_NETS_DIR/$net.json" --bab \
              --timeout 30 --bab-max-depth 8 --bab-max-subproblems 300
          done

      - name: BaB solver tiers — dual / dual_alpha / dual_alpha_eta (acasxu)
        run: |
          cd ${{ github.workspace }}
          for tier in dual dual_alpha dual_alpha_eta; do
            coverage run -p -m act.pipeline --verify vnnlib --category acasxu_2023 --max-instances 2 \
              --solvers dual --bab --bab-solver-tier $tier --bab-max-depth 3 --bab-max-nodes 10 \
              --device cpu --dtype float64
          done

      - name: BaB on VNNLIB — dist_shift (dual_alpha_eta)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --verify vnnlib --category dist_shift_2023 --max-instances 2 \
            --solvers dual --bab --bab-solver-tier dual_alpha_eta --bab-max-depth 3 --bab-max-nodes 10 \
            --device cpu --dtype float64

      - name: BaB on VNNLIB — safenlp (dual_alpha_eta)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --verify vnnlib --category safenlp_2024 --max-instances 2 \
            --solvers dual --bab --bab-solver-tier dual_alpha_eta --bab-max-depth 3 --bab-max-nodes 10 \
            --device cpu --dtype float64

      # ===================================================================
      # BRANCHING strategies — which neuron / dimension to split.
      # BaBSR / FSB neuron scoring (needs a dual tier).
      # ===================================================================
      - name: BaB branching — BaBSR / FSB
        run: |
          cd ${{ github.workspace }}
          for method in babsr fsb; do
            coverage run -p -m act.pipeline --verify vnnlib --category acasxu_2023 --max-instances 1 \
              --solvers dual --bab --bab-solver-tier dual_alpha_eta \
              --bab-branching-method $method \
              --bab-max-depth 3 --bab-max-nodes 10 --device cpu --dtype float64
          done
          coverage run -p -m act.pipeline --verify vnnlib --category acasxu_2023 --max-instances 1 \
            --solvers dual --bab --bab-solver-tier dual_alpha --bab-per-class-alpha false \
            --bab-max-depth 3 --bab-max-nodes 10 --device cpu --dtype float64
          coverage run -p -m act.pipeline --verify vnnlib --category acasxu_2023 --max-instances 1 \
            --solvers dual --bab --bab-solver-tier dual_alpha_eta --bab-no-incremental-start \
            --bab-max-depth 3 --bab-max-nodes 10 --device cpu --dtype float64

      - name: BaB branching + bounding — BaBSR + top-k pool
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --verify vnnlib --category acasxu_2023 --max-instances 2 \
            --solvers dual --bab --bab-solver-tier dual_alpha_eta \
            --bab-bounding-method topk --bab-branching-method babsr \
            --bab-max-depth 3 --bab-max-nodes 10 --device cpu --dtype float64
      
      - name: BaB split — input split (ACT nets)
        run: |
          cd ${{ github.workspace }}
          for net in layer_testing_bab_deep layer_testing_lrelu; do
            coverage run -p -m act.back_end --verify \
              --network "$ACT_NETS_DIR/$net.json" --bab --bab-bounding topk \
              --bab-input-split-fanout 3 --bab-frontier-cap 8 \
              --timeout 30 --bab-max-depth 8 --bab-max-subproblems 300
          done

      # ===================================================================
      # BOUNDING strategies, tensor size is limited for computation, which 
      # keeps the top-k pending subproblems to expand next (pool)
      # selection / priority order).
      # ===================================================================
      - name: BaB bounding — top-k pool
        run: |
          cd ${{ github.workspace }}
          for net in layer_testing_bab_deep layer_testing_lrelu; do
            coverage run -p -m act.back_end --verify \
              --network "$ACT_NETS_DIR/$net.json" --bab --bab-bounding topk \
              --timeout 30 --bab-max-depth 8 --bab-max-subproblems 300
          done

      - name: BaB bounding — top-k order (depth_lb / greedy / SA)
        run: |
          cd ${{ github.workspace }}
          for order in depth_lb greedy sa; do
            coverage run -p -m act.back_end --verify \
              --network "$ACT_NETS_DIR/layer_testing_bab_deep.json" --bab --bab-bounding topk \
              --bab-bounding-order $order --bab-sa-cooling-rate 0.95 \
              --timeout 30 --bab-max-depth 8 --bab-max-subproblems 300
          done

      - name: BaB split + bounding — N-ary split + SA order (VNNLIB)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --verify vnnlib --category acasxu_2023 --max-instances 2 \
            --solvers dual --bab --bab-solver-tier dual_alpha_eta \
            --bab-bounding-method topk --bab-bounding-order sa --bab-sa-cooling-rate 0.97 \
            --bab-input-split-fanout 3 --bab-frontier-cap 8 \
            --bab-max-depth 3 --bab-max-nodes 10 --device cpu --dtype float64

      # ── Search structure — provenance sidecar (node_id / parent_id) ──
      - name: BaB — Tracing parent and its subproblems
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --verify vnnlib --category acasxu_2023 --max-instances 1 \
            --solvers dual --bab --bab-solver-tier dual_alpha_eta \
            --bab-bounding-method topk --bab-provenance \
            --bab-max-depth 3 --bab-max-nodes 10 --device cpu --dtype float64

      # ── Coverage ───────────────────────────────────────────────────────
      - name: Combine coverage data
        if: always()
        run: |
          cd ${{ github.workspace }}
          coverage combine
          coverage xml -o coverage.xml
          coverage report

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: bab
          name: bab
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
