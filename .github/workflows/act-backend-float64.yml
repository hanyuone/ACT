name: ACT Backend Tests (float64)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHONPATH: ${{ github.workspace }}
  # Optional: make TF deterministic-ish and reduce noisy logs
  TF_ENABLE_ONEDNN_OPTS: "0"
  # Enable CI mode for lightweight installs
  ACT_CI_MODE: "true"

jobs:
  backend-float64:
    name: Backend Tests (float64)
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Clean pip cache
        run: |
          pip cache purge || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage torch torchvision onnx onnx2torch tensorflow pandas numpy pyyaml tqdm pytest psutil transformers scikit-learn

      # Network Generation & Basic Tests

      - name: Generate Networks (float64)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.back_end --generate --device cpu --dtype float64

      - name: Run Serialization Tests (float64)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.back_end --test-serialization --device cpu --dtype float64

      - name: Run ACT2Torch Tests (float64)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --verify act2torch --device cpu --dtype float64

      - name: Run Verifier Self-Tests (float64)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.back_end.verifier

      # Level 1: Counterexample/Soundness Validation

      - name: Run Counterexample Validation (float64)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --validate-verifier --mode counterexample --device cpu --dtype float64

      # Level 2: Bounds Validation (per TF mode)

      - name: Run Bounds Validation (float64, interval)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --validate-verifier --mode bounds --device cpu --dtype float64 --tf-modes interval

      - name: Run Bounds Validation (float64, hybridz)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --validate-verifier --mode bounds --device cpu --dtype float64 --tf-modes hybridz

      - name: Run Bounds Validation (float64, dual)
        run: |
          cd ${{ github.workspace }}
          coverage run -p --source=act -m act.pipeline --validate-verifier --mode bounds --device cpu --dtype float64 --tf-modes dual

      - name: Combine coverage data
        if: always()
        run: |
          cd ${{ github.workspace }}
          coverage combine || true
          coverage xml -o coverage.xml || true
          coverage report || true

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend-float64
          name: backend-float64
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
