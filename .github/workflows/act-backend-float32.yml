name: ACT Backend Tests (float32)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHONPATH: ${{ github.workspace }}
  # Optional: make TF deterministic-ish and reduce noisy logs
  TF_ENABLE_ONEDNN_OPTS: "0"
  # Enable CI mode for lightweight installs
  ACT_CI_MODE: "true"

jobs:
  backend-float32:
    name: Backend Tests (float32)
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Clean pip cache
        run: |
          pip cache purge

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage torch torchvision onnx onnx2torch onnx-simplifier tensorflow pandas numpy pyyaml tqdm psutil transformers scikit-learn

      # Network Generation & Basic Tests

      - name: Generate Networks (float32)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.back_end --generate --device cpu --dtype float32

      - name: Run Serialization Tests (float32)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.back_end --test-serialization --device cpu --dtype float32

      - name: Run ACT2Torch Tests (float32)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --verify act2torch --device cpu --dtype float32

      - name: Run Verifier Self-Tests (float32)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.back_end.verifier

      # ─────────────────────────────────────────────────────────────────
      # Soundness check (TF-agnostic): runs once before per-solver matrix.
      # See act-backend-float64.yml for the full rationale.
      # ─────────────────────────────────────────────────────────────────
      - name: Soundness — counterexample validation (float32)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --validate-verifier --mode counterexample --device cpu --dtype float32

      # ─────────────────────────────────────────────────────────────────
      # Per-solver verification matrix (3 solvers × 2 commands each).
      # Each solver: (1) --validate-verifier --mode bounds (TF soundness,
      # skipped for dual which is a backward Solver), (2) --validate-verifier
      # --mode counterexample (E2E verify_once on every factory net + CEX
      # cross-validation against PyTorch model; subsumes the historical
      # --verify-all entry point).
      # ─────────────────────────────────────────────────────────────────

      # Solver 1: IntervalTF (forward box) + LP cascade
      - name: Solver = interval + LP cascade (float32)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --validate-verifier --mode bounds --device cpu --dtype float32 --tf-modes interval
          coverage run -p -m act.pipeline --validate-verifier --mode counterexample --device cpu --dtype float32 --tf-modes interval --solvers torchlp

      # Solver 2: HybridzTF (zonotope forward) + LP cascade
      - name: Solver = hybridz + LP cascade (float32)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --validate-verifier --mode bounds --device cpu --dtype float32 --tf-modes hybridz
          coverage run -p -m act.pipeline --validate-verifier --mode counterexample --device cpu --dtype float32 --tf-modes hybridz --solvers torchlp

      # Solver 3: DualSolver (CROWN/Wong-Kolter backward, no LP cascade)
      - name: Solver = dual (CROWN backward, float32)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --validate-verifier --mode counterexample --device cpu --dtype float32 --solvers dual

      - name: List example networks (back_end)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.back_end --list-examples

      - name: Combine coverage data
        if: always()
        run: |
          cd ${{ github.workspace }}
          coverage combine
          coverage xml -o coverage.xml
          coverage report

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: backend-float32
          name: backend-float32
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
