name: ACT Pipeline Fuzz Tests

# CI: fuzz PyTorch models loaded from real VNNLIB benchmarks (CIFAR-100).
# Drives `act.pipeline --fuzz` with `--dataset` and `--category` flags.
#
# Backend / verify CIs operate on ACT nets generated by
# `act.back_end --generate` (netfactory) — different surface.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHONPATH: ${{ github.workspace }}
  TF_ENABLE_ONEDNN_OPTS: "0"
  ACT_CI_MODE: "true"

jobs:
  pipeline-fuzz:
    name: Pipeline Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Clean pip cache
        run: |
          pip cache purge

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage torch torchvision onnx onnx2torch onnx-simplifier tensorflow pandas numpy pyyaml tqdm psutil transformers scikit-learn

      - name: Cache CIFAR-100 VNNLIB benchmark
        id: cifar100-cache
        uses: actions/cache@v4
        with:
          path: data/vnnlib/cifar100_2024
          key: vnnlib-cifar100-2024-v1

      - name: Download CIFAR-100 benchmark
        if: steps.cifar100-cache.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --download cifar100_2024

      - name: List downloaded data-model pairs
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --list-downloaded

      - name: Get benchmark info
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --info cifar100_2024

      - name: Run fuzzing with --dataset flag (TorchVision creator)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --fuzz --dataset cifar100_2024 --max-instances 2 --timeout 30 --iterations 500

      - name: Run fuzzing with --category flag (VNNLib creator)
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --fuzz --category cifar100_2024 --max-instances 2 --timeout 30 --iterations 500

      - name: Test list command
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --list

      - name: Test search command
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --search cifar

      - name: VNNLIB real-instance coverage (tiny test fixtures) + execution tracing
        run: |
          cd ${{ github.workspace }}
          coverage run -p -m act.pipeline --fuzz --category test --max-instances 5 --timeout 10 --iterations 50 --trace-level 1 --trace-sample 5
          TRACE_FILE=$(ls -1 fuzzing_results/traces_*.json act/pipeline/log/fuzzing_results/traces_*.json 2>/dev/null | head -1)
          if [ -n "$TRACE_FILE" ]; then
            coverage run -p -m act.pipeline.fuzzing.trace_reader "$TRACE_FILE" --summary
          fi

      - name: Combine coverage data
        if: always()
        run: |
          cd ${{ github.workspace }}
          coverage combine
          coverage xml -o coverage.xml
          coverage report

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: pipeline-fuzz
          name: pipeline-fuzz
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
