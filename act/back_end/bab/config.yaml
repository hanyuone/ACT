# Branch-and-Bound Configuration

bab:
  # Resource limits
  max_depth: 20
  max_nodes: 2000
  time_budget_s: 300.0

  # Strategy selection
  #   branching_method: "random" (baseline)
  #   scheduling_method: "random" (baseline)
  branching_method: "random"
  scheduling_method: "random"

  # Output
  verbose: false
